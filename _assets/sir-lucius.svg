    <ellipse cx="10" cy="-14" rx="8" ry="4" fill="#3f7d2a" transform="rotate(-25 10 -14)"/>
  </g>
  <!-- face-paint cross -->
  <g stroke="#c34a36" stroke-width="3" opacity="0.92">
    <line x1="150" y1="150" x2="150" y2="167"/>
    <line x1="141" y1="158.5" x2="159" y2="158.5"/>
  </g>
